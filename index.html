<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will you be my Valentine?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(180deg, #FEE1ED 0%, #F9A8D4 100%); 
            font-family: 'Arial', sans-serif;
            text-align: center;
            overflow: hidden; 
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #be185d;
            font-size: 32px;
            margin-bottom: 20px;
            max-width: 100%;
            word-wrap: break-word; 
            font-weight: bold;
        }

        img {
            width: 250px;
            height: 250px;
            object-fit: contain;
            margin-bottom: 30px;
            border-radius: 15px;
            pointer-events: none; /* Prevents long-press save options on mobile */
        }

        .buttons {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            width: 100%;
        }

        button {
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        #yes-btn {
            background-color: #4caf50;
            color: white;
            font-size: 20px;
            padding: 12px 24px;
            transition: all 0.3s ease;
            z-index: 2;
            max-width: 90vw;
            box-sizing: border-box;
        }

        #yes-btn:hover {
            background-color: #45a049;
        }

        #no-btn {
            background-color: #f44336;
            color: white;
            font-size: 20px;
            padding: 12px 24px;
            z-index: 5;
            transition: left 0.4s ease-out, top 0.4s ease-out, background-color 0.3s ease;
        }

        #no-btn:hover {
            background-color: #da190b;
        }

        .hidden {
            display: none !important;
        }

        #success-container h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        #success-container p {
            color: #be185d;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Question Page -->
    <div class="container" id="question-container">
        <h1>Will you be my Valentine? 💕</h1>
        
        <!-- Default Image -->
        <img id="main-gif" src="1.gif" alt="Cute character">
        
        <div class="buttons">
            <button id="yes-btn" onclick="sayYes()">Yes</button>
            <button id="no-btn" onclick="sayNo()">No</button>
        </div>
    </div>

    <!-- Success Page -->
    <div class="container hidden" id="success-container">
        <h1>Knew you would say yes! 🥳</h1>
        
        <!-- Success/Kissing Image -->
        <img src="5.gif" alt="Happy characters">

        <p>You just made me the happiest person!</p>
    </div>

    <script>
        const noMessages = [
            "No",
            "Are you positive? 🤔",
            "Pookie please...🥺",
            "If you say no, I will be really sad...😔",
            "I will be very sad...😭",
            "Please??? 🥺",
            "Don't do this to me...",
            "Last chance! 😾"
        ];

        // Using your downloaded local files
        const sadGifs = [
            "1.gif", 
            "2.gif", 
            "3.gif", 
            "4.gif"  
        ];

        let clickCount = 0;
        let isFloating = false;

        function sayNo() {
            const noBtn = document.getElementById("no-btn");
            const yesBtn = document.getElementById("yes-btn");
            const mainGif = document.getElementById("main-gif");

            if (isFloating) return; 

            clickCount++;

            if (clickCount >= noMessages.length) {
                isFloating = true;
                noBtn.addEventListener("mouseover", dodgeButton);
                noBtn.addEventListener("touchstart", function(e) {
                    e.preventDefault(); 
                    dodgeButton();
                }, { passive: false });
                dodgeButton();
                return;
            }

            noBtn.innerText = noMessages[clickCount];

            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            let newSize = currentSize * 1.35; 
            
            const maxFontSize = window.innerWidth * 0.20; 
            if (newSize > maxFontSize) {
                newSize = maxFontSize;
            }

            yesBtn.style.fontSize = newSize + "px";
            yesBtn.style.padding = `${newSize / 2}px ${newSize}px`;

            const gifIndex = Math.min(Math.floor(clickCount / 2), sadGifs.length - 1);
            mainGif.src = sadGifs[gifIndex];
        }

        function dodgeButton() {
            const noBtn = document.getElementById("no-btn");
            
            noBtn.style.position = 'fixed';
            
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            
            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function sayYes() {
            document.getElementById("question-container").classList.add("hidden");
            document.getElementById("success-container").classList.remove("hidden");
        }
    </script>

</body>
</html>
